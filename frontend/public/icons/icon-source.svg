<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32"/>
      <stop offset="100%" style="stop-color:#1B5E20"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F"/>
      <stop offset="100%" style="stop-color:#FFA000"/>
    </linearGradient>
  </defs>
  <!-- Green circle background -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <!-- Subtle ring -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#43A047" stroke-width="8"/>
  <!-- Lightning bolt -->
  <path d="M 290 56 L 170 264 L 244 264 L 222 456 L 342 232 L 268 232 Z"
        fill="url(#bolt)"
        stroke="#F57F17"
        stroke-width="6"
        stroke-linejoin="round"/>
  <!-- Small sun rays (top-right, representing solar) -->
  <circle cx="390" cy="122" r="28" fill="#FFF9C4" opacity="0.9"/>
  <line x1="390" y1="78" x2="390" y2="62" stroke="#FFF9C4" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="421" y1="91" x2="432" y2="80" stroke="#FFF9C4" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="434" y1="122" x2="450" y2="122" stroke="#FFF9C4" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="421" y1="153" x2="432" y2="164" stroke="#FFF9C4" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="359" y1="91" x2="348" y2="80" stroke="#FFF9C4" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
</svg>
